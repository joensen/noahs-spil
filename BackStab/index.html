<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Back Stab</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <canvas id="game" width="800" height="400"></canvas>
    <div id="ui">
        <h1>Back Stab</h1>
        <p id="instructions">Brug <kbd>← →</kbd> til at bevæge dig. Tryk <kbd>Shift</kbd> for at glide baglæns.<br>
        Tryk <kbd>Mellemrum</kbd> mens du glider for at stikke!</p>
        <p id="message"></p>
        <button id="startBtn">Start</button>
    </div>
    <script src="script.js"></script>
</body>
</html>
