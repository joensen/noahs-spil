<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brainrot Navne</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game">
        <div id="header">
            <h1>🧠 Brainrot Navne 🧠</h1>
            <div id="stats">
                <span id="money">0 kr</span>
                <span id="per-click">1 kr per klik</span>
                <span id="clicks">0 klik</span>
            </div>
        </div>
        <div id="shop">
            <button id="buy-btn" disabled>
                Køb ny Brainrot<br>
                <span id="price">Pris: 100 kr</span>
            </button>
            <button id="pause-btn">Pause</button>
            <button id="mute-btn">Lyd: FRA</button>
        </div>
        <div id="brainrot-area"></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
