<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skak</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Skak</h1>
        <div class="time-selector" id="timeSelector">
            <h2>Vælg tid</h2>
            <div class="time-buttons">
                <button class="time-btn" data-time="0">Ingen ur</button>
                <button class="time-btn" data-time="60">1 min</button>
                <button class="time-btn" data-time="180">3 min</button>
                <button class="time-btn" data-time="300">5 min</button>
                <button class="time-btn" data-time="600">10 min</button>
                <button class="time-btn" data-time="900">15 min</button>
            </div>
        </div>
        <div class="game-area" id="gameArea" style="display:none;">
            <div class="clock-bar">
                <div class="clock black-clock" id="blackClock">
                    <span class="clock-label">Sort</span>
                    <span class="clock-time" id="blackTime">--:--</span>
                </div>
            </div>
            <div class="status" id="status">Hvid starter</div>
            <div class="board" id="board"></div>
            <div class="clock-bar">
                <div class="clock white-clock" id="whiteClock">
                    <span class="clock-label">Hvid</span>
                    <span class="clock-time" id="whiteTime">--:--</span>
                </div>
            </div>
        </div>
        <div class="promotion-modal" id="promotionModal">
            <h2>Vælg brik</h2>
            <div class="promotion-choices" id="promotionChoices"></div>
        </div>
        <button class="restart-btn" id="restartBtn">Nyt Spil</button>
        <div class="controls">
            <a href="../index.html" class="back-btn">&larr; Tilbage til Spil</a>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
