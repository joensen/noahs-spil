    <rect x="48" y="0" width="46" height="46" rx="8" fill="#53d7ff"/>
    <rect x="96" y="0" width="46" height="46" rx="8" fill="#53d7ff"/>
    <rect x="144" y="0" width="46" height="46" rx="8" fill="#53d7ff"/>
    <rect x="96" y="48" width="46" height="46" rx="8" fill="#b36bff"/>
    <rect x="48" y="96" width="46" height="46" rx="8" fill="#b36bff"/>
    <rect x="96" y="96" width="46" height="46" rx="8" fill="#b36bff"/>
    <rect x="144" y="96" width="46" height="46" rx="8" fill="#b36bff"/>
