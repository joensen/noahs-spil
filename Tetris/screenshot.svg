  <text x="708" y="402" fill="#ffffff" font-family="Trebuchet MS, Segoe UI, sans-serif" font-size="20">Arrows</text>
  <text x="620" y="436" fill="#d8e2f0" font-family="Trebuchet MS, Segoe UI, sans-serif" font-size="20">Drop</text>
