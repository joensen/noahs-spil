<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-labelledby="title desc">
  <title id="title">Tetris screenshot</title>
  <desc id="desc">A warm arcade-style preview with colorful falling blocks and a next piece panel.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#fff3cf"/>
      <stop offset="100%" stop-color="#ffbf5f"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#101828"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" rx="28" fill="url(#bg)"/>
  <circle cx="120" cy="90" r="90" fill="#ffffff" fill-opacity=".35"/>
  <circle cx="720" cy="520" r="120" fill="#ff8f4a" fill-opacity=".2"/>
  <rect x="54" y="52" width="252" height="496" rx="28" fill="url(#panel)" fill-opacity=".94"/>
  <rect x="328" y="32" width="238" height="536" rx="34" fill="#081120"/>
  <rect x="594" y="122" width="152" height="168" rx="24" fill="url(#panel)" fill-opacity=".94"/>
  <rect x="594" y="318" width="152" height="166" rx="24" fill="url(#panel)" fill-opacity=".94"/>
  <text x="84" y="100" fill="#ffd54a" font-family="Trebuchet MS, Segoe UI, sans-serif" font-size="24" letter-spacing="5">NOAH'S ARCADE</text>
  <text x="84" y="164" fill="#ffffff" font-family="Trebuchet MS, Segoe UI, sans-serif" font-size="64" font-weight="700">Tetris</text>
  <text x="84" y="208" fill="#d8e2f0" font-family="Trebuchet MS, Segoe UI, sans-serif" font-size="22">Stack, rotate, survive.</text>
  <text x="84" y="280" fill="#d8e2f0" font-family="Trebuchet MS, Segoe UI, sans-serif" font-size="20">Score</text>
  <text x="84" y="320" fill="#ffffff" font-family="Trebuchet MS, Segoe UI, sans-serif" font-size="38" font-weight="700">12,480</text>
  <text x="84" y="390" fill="#d8e2f0" font-family="Trebuchet MS, Segoe UI, sans-serif" font-size="20">Lines</text>
  <text x="84" y="430" fill="#ffffff" font-family="Trebuchet MS, Segoe UI, sans-serif" font-size="38" font-weight="700">37</text>
  <text x="84" y="500" fill="#d8e2f0" font-family="Trebuchet MS, Segoe UI, sans-serif" font-size="20">Level</text>
  <text x="84" y="540" fill="#ffffff" font-family="Trebuchet MS, Segoe UI, sans-serif" font-size="38" font-weight="700">4</text>
  <g opacity=".16" stroke="#ffffff">
    <path d="M352 68h190M352 116h190M352 164h190M352 212h190M352 260h190M352 308h190M352 356h190M352 404h190M352 452h190M352 500h190"/>
    <path d="M352 68v476M400 68v476M448 68v476M496 68v476M544 68v476"/>
